<style>

:root{
--azul:#0d1b3d;
--amarelo:#f4c542;
}

body{
margin:0;
font-family:Arial;
background: linear-gradient(180deg,#dcdcdc,#cfcfcf);
color:#0d1b3d;
text-align:center;
overflow-x: hidden;
}

/* Container */

.container{
display:flex;
flex-direction:column;
gap:40px;
padding:20px;
}

/* Card */

.card{
max-width:600px;
width:90%;
padding:20px;
border:3px solid black;
border-radius:12px;
background:white;
box-shadow:6px 6px 0px black;

opacity:0;
transform:translateY(40px);
transition:0.8s;
transform:rotate(-1deg);
}

/* Posições */

.left{
margin-left:0;
margin-right:auto;
transform:translateX(-60px);
}

.right{
margin-left:auto;
margin-right:0;
transform:translateX(60px);
}

/* Quando aparece */

.card.show{
opacity:1;
transform:translateX(0);
}

/* Texto */

.texto{
text-align: center;
white-space:pre-line;
line-height:1.6;
color:#0d1b3d;
font-weight:500;
}

/* Imagem */

.imgBox{
margin-top:20px;
display:none;
opacity:0;
transition:1s;
}

.imgBox.show{
display:block;
opacity:1;
}

.imgBox img{
width:100%;
border-radius:8px;
border:2px solid black;
}

/* Links Spotify */

a{
text-align: center;
color:#eab308;
display:block;
margin-top:10px;
text-decoration:none;
font-weight:bold;
}

/* Música Aparece */

.musica{
display:none;
opacity:0;
transition:0.5s;
}

.musica.show{
display:block;
opacity:1;
}

/* Dark mode forçado */
:root{
    color-scheme: light;
}

/* Forçando visual */
html,body{
    background:#e4e4e4 !important;
    color:#0d1b3d !important;
}


/* TELA INICIAL */

#envelopeTela{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#d6d6d6;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}

/* ENVELOPE */

.envelope{
width:220px;
height:140px;
position:relative;
cursor:pointer;
transition:0.3s;
perspective: 800px;
}

.envelope:hover{
transform:scale(1.05);
}

/* CORPO */

.corpo{
width:100%;
height:100%;
background:#f4c542;
border:3px solid black;
border-radius:6px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-weight:bold;
position: relative;
z-index: 2;
}

/* TAMPA */

.flap{
position:absolute;
top:0;
left:0;
width:100%;
height:70px;
background:#eab308;
clip-path:polygon(0 0, 100% 0, 50% 100%);
transform-origin:top;
transition:0.6s ease;
z-index: 3;
}

/* TEXTO */

.destino{
text-align:left;
color:#0d1b3d;
}

.abrirTexto{
margin-top:15px;
color:#0d1b3d;
font-size:14px;
}

/* ANIMAÇÃO AO ABRIR */

.envelope.aberto .flap{
transform:rotateX(-180deg);
}

/* CARTA INTERNA */

.carta{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%) translateY(6px);
width:180px;
height:110px;
background:white;
border:2px solid black;
border-radius:6px;
z-index:0;
transition:0.6s ease;
}

/* QUANDO ABRE */

.envelope.aberto .carta{
transform:translateX(-50%) translateY(-40px);
}

</style>
</head>
