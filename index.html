<title>Declaração</title>

<style>

:root{
--azul:#0d1b3d;
--amarelo:#f4c542;
}

body{
margin:0;
font-family:Arial;
background: linear-gradient(180deg,#f8e8ee,#e0c3fc);
color:#0d1b3d;
text-align:center;
overflow-x: hidden;
}

/* brilho */
#envelopeTela::before{
content:"";
position:absolute;
width:300px;
height:300px;
background:radial-gradient(circle, rgba(255,214,224,0.5), transparent);
filter:blur(40px);
}

.container{
display:flex;
flex-direction:column;
gap:40px;
padding:20px;
}

/* polaroid */
.card{
max-width:600px;
width:90%;
padding:15px 15px 30px 15px;
border:2px solid black;
border-radius:8px;
background:white;
box-shadow:6px 6px 0px black;

opacity:0;
transform:translateY(40px) rotate(-1deg);
transition: all 0.8s cubic-bezier(.22,1,.36,1);
}

.left{margin-right:auto; transform:translateX(-60px);}
.right{margin-left:auto; transform:translateX(60px);}

.card.show{
opacity:1;
transform:translateX(0);
}

.texto{
white-space:pre-line;
line-height:1.6;
font-family:'Courier New', monospace;
}

.imgBox{
margin-top:20px;
display:none;
opacity:0;
transition:1s;
}

.imgBox{
position:relative;
}

.imgBox::before,
.imgBox::after{
content:"";
position:absolute;
width:40px;
height:12px;
background:#fef08a;
top:-6px;
opacity:0.8;
}

.imgBox::before{
left:20px;
transform:rotate(-10deg);
}

.imgBox::after{
right:20px;
transform:rotate(10deg);
}
  
.imgBox.show{
display:block;
opacity:1;
}

.imgBox img{
width:100%;
max-width:320px;
height:220px;
object-fit:cover;
border-radius:8px;
border:2px solid black;
margin:auto;
display:block;
transform:rotate(-1.5deg);
box-shadow:4px 4px 0px black;
}

.musica{
display:none;
opacity:0;
transition:0.5s;
color:#eab308;
font-weight:bold;
text-decoration:none;
margin-top:10px;
}

.musica.show{
display:block;
opacity:1;
}

/* ENVELOPE */

#envelopeTela{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#d6d6d6;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
padding-top:60px;
}

.envelope{
width:260px;
height:170px;
position:relative;
cursor:pointer;
perspective:800px;
box-shadow:10px 10px 0px rgba(0,0,0,0.2);
margin-bottom:20px;
}

.envelope:hover{
transform:scale(1.08) rotate(-1deg);
}

.corpo{
width:100%;
height:100%;
background: linear-gradient(145deg,#f4c542,#ffd95a);
border:3px solid black;
border-radius:6px;
display:flex;
justify-content:center;
align-items:center;
position:relative;
box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
z-index: 2;
padding-top:8px;
padding-bottom:5px;
}

.selo{
position:absolute;
bottom:10px;
right:10px;
font-size:22px;
}

.flap{
position:absolute;
top:0;
width:100%;
height:70px;
background: linear-gradient(145deg,#eab308,#ffd95a);
clip-path:polygon(0 0, 100% 0, 50% 100%);
transform-origin:top;
transition:0.8s cubic-bezier(.22,1,.36,1);
z-index: 3;
backface-visibility: hidden;
}

.envelope.aberto .flap{
transform:rotateX(-180deg);
}

.carta{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%) translateY(6px);
width:220px;
height:170px;
background:white;
border:2px solid black;
border-radius:6px;
transition: all 0.8s cubic-bezier(.22,1,.36,1);
z-index: 1;
}

.envelope.aberto .carta{
transform:translateX(-50%) translateY(-65px);
}

.destino{
font-family:'Courier New', monospace;
font-size:14px;
transform: translateY(8px);
}

.abrirTexto{
margin-top:25px;
opacity:0.8;
animation: pulsar 1.5s infinite;
}

@keyframes pulsar{
0%{opacity:0.5;}
50%{opacity:1;}
100%{opacity:0.5;}
}

</style>
</head>

let index = 0;
const velocidade = 30;

function rodarAnimacao(){

if(index >= colagens.length) return;

const cards = document.querySelectorAll(".card");
const textos = document.querySelectorAll(".texto");
const gifs = document.querySelectorAll(".imgBox");

if(index % 2 === 0){
cards[index].classList.add("left");
}else{
cards[index].classList.add("right");
}

setTimeout(()=> cards[index].classList.add("show"),100);

let i = 0;

function digitar(){
if(i < colagens[index].length){
textos[index].textContent += colagens[index].charAt(i);
i++;
setTimeout(digitar, velocidade);
}
else{
gifs[index].classList.add("show");

setTimeout(()=>{
const musicas = cards[index].querySelectorAll(".musica");
musicas.forEach(m => m.classList.add("show"));

index++;
rodarAnimacao();
},1500);
}
}

digitar();
}

rodarAnimacao();

function abrirCarta(){
const env = document.querySelector(".envelope");
env.classList.add("aberto");

setTimeout(()=>{
document.getElementById("envelopeTela").style.display="none";
},1200);
}
